# Local PostgreSQL for Solid Xpress Team OS.
#   docker compose up -d        # start Postgres on localhost:5432
#   docker compose down         # stop
#   docker compose down -v      # stop and delete all data
#
# Matches the default DATABASE_URL in .env:
#   postgresql://postgres:postgres@localhost:5432/solidxpress
services:
  postgres:
    image: postgres:16-alpine
    container_name: solidxpress-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: solidxpress
    ports:
      - "5432:5432"
    volumes:
      - solidxpress_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d solidxpress"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  solidxpress_pgdata:
